name: Promotion Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
      version:
        description: Image tag to deploy (e.g. v0.0.1-ga1b2c3d or commit SHA)
        required: true
        type: string

env:
  SERVICE_NAME: springboot-crud-service
  KIND_CLUSTER: vvd-local

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - name: Update Image Tag
        run: |
          VALUES_FILE="deployment/values/${{ inputs.environment }}.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Values file not found: $VALUES_FILE"
            exit 1
          fi
          sed -i "s|tag: .*|tag: \"${{ inputs.version }}\"|" "$VALUES_FILE"
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment/values/
          git diff --cached --quiet || git commit -m "promote: ${{ env.SERVICE_NAME }} ${{ inputs.version }} → ${{ inputs.environment }}"
          git push
      - name: Trigger ArgoCD Sync
        run: |
          argocd app sync ${{ env.SERVICE_NAME }} --grpc-web --plaintext --server localhost:8080 || true
          argocd app wait ${{ env.SERVICE_NAME }} --grpc-web --plaintext --server localhost:8080 --timeout 120 || true
        continue-on-error: true
      - name: Deployment Summary
        run: |
          echo "### Promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | ${{ env.SERVICE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ inputs.environment }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ inputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ArgoCD | http://localhost:8080/applications/${{ env.SERVICE_NAME }} |" >> "$GITHUB_STEP_SUMMARY"
