name: Build and Publish

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew test integrationTest --no-daemon

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # Install the Bitwarden Secrets Manager CLI (bws).
      # bws can fetch secrets by name — no UUIDs needed.
      # BW_ACCESS_TOKEN is an org-level secret (non-deployment, read-only access token).
      # Pinned to bws-v2.1.0: the releases/latest API returns a Python SDK release
      # (python-v2.1.0), not the bws CLI release — so dynamic discovery breaks.
      - name: Install Bitwarden SM CLI (bws)
        run: |
          BW_VERSION="2.1.0"
          ASSET="bws-x86_64-unknown-linux-gnu-${BW_VERSION}.zip"
          URL="https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BW_VERSION}/${ASSET}"
          curl -fsSL "${URL}" -o /tmp/bws.zip
          mkdir -p /tmp/bws-bin
          unzip /tmp/bws.zip -d /tmp/bws-bin
          find /tmp/bws-bin -name 'bws' -type f -exec sudo install -m 0755 {} /usr/local/bin/bws \;
          echo "bws installed: $(bws --version)"

      - name: Get JFrog credentials from Bitwarden SM
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          SECRETS=$(bws secret list --output json)

          get_val() {
            printf '%s' "$SECRETS" | jq -r --arg k "$1" '.[] | select(.key == $k) | .value'
          }

          JFROG_URL=$(get_val "JFROG_URL")
          JFROG_USERNAME=$(get_val "JFROG_USERNAME")
          JFROG_ACCESS_TOKEN=$(get_val "JFROG_ACCESS_TOKEN")

          # Mask all three values so they never appear in logs
          echo "::add-mask::$JFROG_URL"
          echo "::add-mask::$JFROG_USERNAME"
          echo "::add-mask::$JFROG_ACCESS_TOKEN"

          {
            echo "JFROG_URL=$JFROG_URL"
            echo "JFROG_USERNAME=$JFROG_USERNAME"
            echo "JFROG_ACCESS_TOKEN=$JFROG_ACCESS_TOKEN"
          } >> "$GITHUB_ENV"

      # JFROG_URL may include https:// prefix — Docker login needs hostname only.
      - name: Prepare registry host
        id: registry
        run: |
          HOST="${JFROG_URL#https://}"
          HOST="${HOST#http://}"
          echo "host=${HOST}" >> $GITHUB_OUTPUT

      - name: Docker Login (JFrog)
        run: |
          echo "$JFROG_ACCESS_TOKEN" | \
            docker login "${{ steps.registry.outputs.host }}" \
              -u "$JFROG_USERNAME" --password-stdin

      - name: Build JAR
        run: chmod +x gradlew && ./gradlew bootJar --no-daemon -x test

      - name: Set Image Tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION=$(./gradlew properties --no-daemon -q | grep "^version:" | awk '{print $2}' | tr -d '-SNAPSHOT')
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${{ steps.registry.outputs.host }}/springboot-crud-service" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.image }}:v${{ steps.tags.outputs.version }}

      - name: Update dev values with new image tag
        run: |
          sed -i "s|tag: .*|tag: \"${{ steps.tags.outputs.sha }}\"|" deployment/values/dev.yaml

      - name: Commit updated image tag (GitOps trigger)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment/values/dev.yaml
          git diff --cached --quiet || git commit -m "ci: update springboot-crud-service image to ${{ steps.tags.outputs.sha }}"
          git push
