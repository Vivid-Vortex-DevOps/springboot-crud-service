spring:
  jpa:
    properties:
      hibernate:
        format_sql: true

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.crud: DEBUG
    org.hibernate.SQL: DEBUG
