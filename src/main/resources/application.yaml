spring:
  application:
    name: springboot-crud-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/springboot_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:cruduser}
    password: ${SPRING_DATASOURCE_PASSWORD}   # no default — must be injected

  jpa:
    hibernate:
      ddl-auto: validate    # Flyway owns schema; Hibernate only validates
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:}
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:default}

logging:
  structured:
    format: ecs
  level:
    root: INFO
    com.crud: INFO
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
