apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "springboot-crud-service.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "springboot-crud-service.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.env.SPRING_PROFILES_ACTIVE | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
