replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 800m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: staging
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318"

serviceAccount:
  annotations:
    azure.workload.identity/client-id: ""

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
