replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 700m
    memory: 768Mi

env:
  SPRING_PROFILES_ACTIVE: qa
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318"

serviceAccount:
  annotations:
    azure.workload.identity/client-id: ""

autoscaling:
  enabled: false
